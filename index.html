<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Studio 21 A1 – Intensivtraining E-Book</title>
  <link rel="stylesheet" href="css/ebook.css">
</head>
<body>
<header class="topbar">
  <div class="topbar-left">
    <button class="menu-toggle" id="menuToggle">☰</button>
    <div class="book-title">
      <span class="studio">studio</span><span class="badge">[21]</span>
      <span class="subtitle">A1 · Intensivtraining</span>
    </div>
  </div>
  <div class="page-nav">
    <button class="nav-btn" id="btnFirst">⏮</button>
    <button class="nav-btn" id="btnPrev">‹</button>
    <span class="page-indicator">
      Seite <input type="number" id="pageInput" min="1" value="1"> / <span id="totalPages">–</span>
    </span>
    <button class="nav-btn" id="btnNext">›</button>
    <button class="nav-btn" id="btnLast">⏭</button>
  </div>
  <div class="topbar-right">
    <button class="tool-btn" id="btnZoomOut" title="Verkleinern">−</button>
    <button class="tool-btn" id="btnZoomIn"  title="Vergrößern">+</button>
    <button class="tool-btn check-btn" id="btnCheck">✓ Prüfen</button>
    <button class="tool-btn" id="btnReset">↺ Reset</button>
    <button class="tool-btn" id="btnSolution">💡 Lösung</button>
  </div>
</header>

<nav class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <span>Inhaltsverzeichnis</span>
    <button id="sidebarClose">✕</button>
  </div>
  <div class="toc-list" id="tocList"></div>
</nav>
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<main class="viewer" id="viewer">
  <div class="loading-screen" id="loadingScreen">
    <div class="loading-logo">studio <span>[21]</span></div>
    <div class="loading-bar"><div class="loading-fill" id="loadingFill"></div></div>
    <div class="loading-msg" id="loadingMsg">Lädt Seiten…</div>
  </div>
  <div class="page-wrap" id="pageWrap" style="display:none">
    <div class="page-canvas" id="pageCanvas">
      <img class="page-image" id="pageImage" src="" alt="Seite">
    </div>
  </div>
  <div class="score-toast" id="scoreToast" style="display:none"></div>
</main>

<div class="float-player" id="floatPlayer" style="display:none">
  <div class="fp-header">
    <span class="fp-track" id="fpTrack">–</span>
    <button class="fp-close" id="fpClose">✕</button>
  </div>
  <div class="fp-progress-wrap" id="fpProgressWrap">
    <div class="fp-progress-fill" id="fpProgressFill"></div>
  </div>
  <div class="fp-footer">
    <div class="fp-controls">
      <button class="fp-btn" id="fpRewind" title="−10s">«10</button>
      <button class="fp-btn fp-play" id="fpPlay">▶</button>
    </div>
    <span class="fp-time" id="fpTime">0:00</span>
    <input type="range" class="fp-vol" id="fpVol" min="0" max="1" step="0.05" value="1" title="Lautstärke">
  </div>
</div>

<script src="js/ebook.js"></script>
</body>
</html>
